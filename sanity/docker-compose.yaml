services:
  otelcol:
    build:
      context: ..
      dockerfile: Dockerfile
    image: otelcol-custom:0.156.0
    command: ["--config", "/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-validate.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"

  telemetrygen:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.156.0
    profiles: ["tools"]
    command: ["traces", "--otlp-endpoint", "otelcol:4317", "--otlp-insecure", "--traces", "5"]
