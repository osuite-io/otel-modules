receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  ingestlimiter:
    quota_endpoint: http://quota-stub:5678
    poll_interval: 1s
    request_timeout: 2s
    fail_open: true
    max_staleness: 1h
    retry_after: 30s
  batch: {}

exporters:
  debug:
    verbosity: normal

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [ingestlimiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [ingestlimiter, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [ingestlimiter, batch]
      exporters: [debug]
